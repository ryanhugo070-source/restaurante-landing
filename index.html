<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Restaurante Sabor & Arte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Sabor & Arte</h1>
        <nav>
            <a href="#sobre">Sobre</a>
            <a href="#cardapio">Cardápio</a>
            <a href="#contato">Contato</a>
        </nav>
    </header>

    <section id="sobre">
        <h2>Sobre Nós</h2>
        <p>Um restaurante familiar com mais de 20 anos servindo comida caseira com carinho e qualidade.</p>
    </section>

    <section id="cardapio">
        <h2>Cardápio</h2>
        <div class="menu-item">
            <span>Feijoada</span>
            <span>R$ 35,00</span>
        </div>
        <div class="menu-item">
            <span>Picanha na Brasa</span>
            <span>R$ 48,00</span>
        </div>
        <div class="menu-item">
            <span>Salada Caesar</span>
            <span>R$ 22,00</span>
        </div>
    </section>

    <section id="contato">
        <h2>Fale Conosco</h2>
        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem"></textarea>

            <button type="submit">Enviar</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Restaurante Sabor & Arte</p>
    </footer>

</body>
</html>
